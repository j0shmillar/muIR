schema_version: 1
fallback_backend: cpu
preferred_layouts: [NCHW, NC]
quantization_modes: [INT4, INT8, F16, F32]
forbidden_partition_boundaries:
  - Conv->Reshape
  - Conv->Transpose
notes: "CVI flow supports multiple quant/deploy modes; layout assumptions are commonly NCHW."

ops:
  - op: Conv
    inputs:
      - dtypes: [f32, i8]
        rank: 4
        layouts: [NCHW]
      - dtypes: [f32, i8]
        rank: 4
        layouts: [NCHW]
    outputs:
      - dtypes: [f32, i8]
        rank: 4
        layouts: [NCHW]
    attrs:
      kernel_shape: {required: true, length: 2, min: 1}
      strides: {required: true, length: 2, min: 1}

  - op: Conv
    inputs:
      - dtypes: [f32, i8]
        rank: 4
        layouts: [NCHW]
      - dtypes: [f32, i8]
        rank: 4
        layouts: [NCHW]
      - dtypes: [f32, i8]
        rank: 1
    outputs:
      - dtypes: [f32, i8]
        rank: 4
        layouts: [NCHW]
    attrs:
      kernel_shape: {required: true, length: 2, min: 1}
      strides: {required: true, length: 2, min: 1}

  - op: Gemm
    inputs:
      - dtypes: [f32, i8]
        rank: 2
        layouts: [NC]
      - dtypes: [f32, i8]
        rank: 2
        layouts: [NC]
    outputs:
      - dtypes: [f32, i8]
        rank: 2
        layouts: [NC]

  - op: Add
    inputs:
      - dtypes: [f32, i8]
      - dtypes: [f32, i8]
    outputs:
      - dtypes: [f32, i8]

  - op: Relu
    inputs:
      - dtypes: [f32, i8]
    outputs:
      - dtypes: [f32, i8]

  - op: MaxPool
    inputs:
      - dtypes: [f32, i8]
        rank: 4
    outputs:
      - dtypes: [f32, i8]
        rank: 4

  - op: AveragePool
    inputs:
      - dtypes: [f32, i8]
        rank: 4
    outputs:
      - dtypes: [f32, i8]
        rank: 4

  - op: GlobalAveragePool
    inputs:
      - dtypes: [f32, i8]
        rank: 4
    outputs:
      - dtypes: [f32, i8]
